<!--
  Arena filter pill icon — flattened crossed swords (pulled from Figma
  node 77:7191).

  The original Figma export also contained a short stroked "Vector"
  path (a tiny diagonal slash, originally drawn in white on top of the
  filled body as a metallic shine highlight). That path has been
  removed here because this SVG is used as a CSS mask — masks have
  no notion of foreground/background colour, every opaque pixel is
  treated as visible, so the white shine reads as an unrelated extra
  notch alongside the main shape. Keeping only the Union path gives
  a clean swords-only silhouette.
-->
